<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeMail Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0f17;
        --panel: #141424;
        --text: #e9e9f7;
        --muted: #9ea1b8;
        --accent: #7c6af7;
        --accent-2: #a799ff;
        --ok: #50d18d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 330px;
        padding: 16px;
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .card {
        background: linear-gradient(180deg, #141424 0%, #121220 100%);
        border: 1px solid #23233b;
        border-radius: 12px;
        padding: 14px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .tagline {
        margin: 6px 0 14px;
        color: var(--muted);
        font-size: 13px;
      }

      label {
        display: block;
        font-size: 12px;
        margin-bottom: 8px;
        color: #c8c9da;
      }

      .input-wrap {
        border-radius: 10px;
        padding: 1px;
        background: linear-gradient(135deg, #2f2f4a 0%, var(--accent) 55%, #2f2f4a 100%);
      }

      input {
        width: 100%;
        padding: 11px 12px;
        border: none;
        border-radius: 9px;
        background: #0f1020;
        color: var(--text);
        outline: none;
        transition: box-shadow 0.2s ease;
      }

      input:focus {
        box-shadow: 0 0 0 2px rgba(124, 106, 247, 0.25);
      }

      button {
        width: 100%;
        margin-top: 12px;
        border: none;
        border-radius: 9px;
        padding: 10px 12px;
        background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 100%);
        color: #0e0f1f;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, filter 0.2s ease;
      }

      button:hover {
        filter: brightness(1.05);
      }

      button:active {
        transform: translateY(1px);
      }

      #status {
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
        margin-top: 10px;
      }

      #status.ok {
        color: var(--ok);
      }

      .note {
        margin-top: 10px;
        font-size: 11px;
        color: #8487a2;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>✦ MeMail</h1>
      <p class="tagline">Replies that sound like you.</p>

      <label for="apiKey">OpenAI API Key</label>
      <div class="input-wrap">
        <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
      </div>

      <button id="saveBtn" type="button">Save Key</button>
      <div id="status">No key stored yet</div>
      <p class="note">
        Your key is stored locally in your browser and never sent anywhere except OpenAI.
      </p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
