<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeMail</title>
    <style>
      body {
        margin: 0;
        width: 340px;
        padding: 14px;
        font-family: "DM Sans", sans-serif;
        background: #0f0f17;
        color: #f3f3ff;
      }
      .card {
        border: 1px solid #2b2b46;
        background: #141423;
        border-radius: 12px;
        padding: 14px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 20px;
      }
      .row {
        margin-top: 10px;
        font-size: 13px;
        color: #c9c9df;
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 12px;
        font-weight: 700;
      }
      .gemini {
        background: #2a4d8f;
      }
      .openai {
        background: #1f6b4f;
      }
      .anthropic {
        background: #8f5d21;
      }
      .deepseek {
        background: #5f3da0;
      }
      button {
        width: 100%;
        margin-top: 10px;
        border: none;
        border-radius: 9px;
        padding: 10px;
        background: #7c5af5;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .secondary {
        background: #282845;
      }
      ul {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      li {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>✦ MeMail</h1>
      <div class="row">Active provider: <span id="activeProvider">None</span></div>
      <div class="row">
        Saved keys:
        <ul id="savedKeys"></ul>
      </div>
      <div class="row" id="lastLearned">Style last updated: Never</div>
      <button id="manageKeysBtn" class="secondary" type="button">Manage Keys</button>
      <button id="relearnBtn" type="button">Re-learn my style now</button>
      <button id="reauthBtn" class="secondary" type="button" style="display: none">
        Re-authorise Gmail access
      </button>
      <div class="row" id="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
